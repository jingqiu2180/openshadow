# Gitee Go CI 配置
# 文档：https://gitee.com/help/articles/4193

name: Tests

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx vitest run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true  # 暂时允许失败，后续修复跨平台路径
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: |
          mkdir -p /tmp/remu-test-workspace
          echo "# Test" > /tmp/remu-test-workspace/jian.md
      - run: npm run build
      - run: npm run test:e2e
        env:
          CI: 'true'
          TEST_FOLDER: /tmp/remu-test-workspace
