<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rem Agent - AI 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: drag;
    }
    .header h1 {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
    }
    .message.user {
      align-self: flex-end;
      background: white;
      color: #333;
    }
    .message.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .input-area {
      background: rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
    }
    .input-area button {
      padding: 12px 24px;
      background: white;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .input-area button:hover {
      transform: scale(1.05);
    }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">🥕</div>
    <h1>Rem Agent</h1>
  </div>
  <div class="chat" id="chat">
    <div class="message assistant">你好！我是 Rem～ 有什么我可以帮你的吗？ 🌸</div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入消息..." />
    <button id="send">发送</button>
  </div>

  <script>
    const chat = document.getElementById('chat')
    const input = document.getElementById('input')
    const sendBtn = document.getElementById('send')

    const API_URL = 'http://localhost:8080' // WebSocket

    function addMessage(content, role) {
      const div = document.createElement('div')
      div.className = `message ${role}`
      div.textContent = content
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
    }

    async function send() {
      const text = input.value.trim()
      if (!text) return

      addMessage(text, 'user')
      input.value = ''
      sendBtn.disabled = true

      try {
        const ws = new WebSocket('ws://localhost:8080')
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: 'chat', content: text }))
        }
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data)
          if (data.type === 'response') {
            addMessage(data.content || '（无响应）', 'assistant')
            ws.close()
          } else if (data.type === 'error') {
            addMessage('错误: ' + data.content, 'assistant')
            ws.close()
          }
          // typing message: don't close, wait for response
        }
        ws.onerror = () => {
          addMessage('连接失败，请确保服务已启动', 'assistant')
          sendBtn.disabled = false
        }
      } catch (e) {
        addMessage('错误: ' + e.message, 'assistant')
        sendBtn.disabled = false
      }
    }

    sendBtn.onclick = send
    input.onkeypress = (e) => {
      if (e.key === 'Enter') send()
    }
  </script>
</body>
</html>
