# HanaAgent 系统配置
# 由设置页面管理，手动编辑也可以

agent:
  name: rem-default
  yuan: hanako
  avatar: null
models:
  chat:
    id: MiniMax-M3
    provider: minimax-token-plan
memory:
  enabled: true
desk:
  heartbeat_enabled: false
  heartbeat_interval: 30
  home_folder: D:/src/aicoding/openshadow
user:
  name: ""
preferences: {}
last_cwd: D:/src/aicoding/openshadow
cwd_history:
  - D:/src/aicoding/openshadow
  - D:/test/workspace-fixture
