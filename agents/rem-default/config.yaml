# HanaAgent 系统配置
# 由设置页面管理，手动编辑也可以

agent:
  name: rem-default
  yuan: hanako
  avatar: null
memory:
  enabled: true
desk:
  heartbeat_enabled: false
  heartbeat_interval: 30
  home_folder: D:/src/aicoding/remu
user:
  name: ""
preferences: {}
last_cwd: D:/src/aicoding/remu
cwd_history:
  - D:/src/aicoding/remu
