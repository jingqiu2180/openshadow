name: Release

# 触发：push 一个 v* tag（如 v0.2.0）即自动构建并发布
# 跳过 pre-release：在 tag 名加 -rc.1 / -beta.1 等后缀会被 electron-builder 识别为 pre-release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 允许创建/更新 GitHub Release

jobs:
  # ───────────────────────── Linux ─────────────────────────
  linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm fakeroot dpkg

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky
      #（DeskSection 等 fake-timer+async 在并行时竞争超时）；实测串行全量 1521 全绿。
      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky；
      # --retry 2 吸收单文件内跨用例共享状态导致的偶发 flaky（如 MobileApp.test.tsx
      # 的异步集成用例），真正坏掉的用例仍会全部失败、门禁有意义。
      - name: Run unit test suite (hard gate)
        run: npm run test:unit -- --no-file-parallelism --retry 2

      - name: Typecheck (non-blocking, visibility)
        run: npm run typecheck
        continue-on-error: true

      - name: Build + package Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
            release/*.blockmap

  # ───────────────────────── Windows ─────────────────────────
  windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky
      #（DeskSection 等 fake-timer+async 在并行时竞争超时）；实测串行全量 1521 全绿。
      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky；
      # --retry 2 吸收单文件内跨用例共享状态导致的偶发 flaky（如 MobileApp.test.tsx
      # 的异步集成用例），真正坏掉的用例仍会全部失败、门禁有意义。
      - name: Run unit test suite (hard gate)
        run: npm run test:unit -- --no-file-parallelism --retry 2

      - name: Typecheck (non-blocking, visibility)
        run: npm run typecheck
        continue-on-error: true

      - name: Generate Windows icon
        run: node scripts/generate-windows-icon.cjs

      - name: Build + package Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Win 不签名（没证书）— 加 CSC_IDENTITY_AUTO_DISCOVERY=false 让 electron-builder 跳过签名
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-windows
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap

  # ───────────────────────── macOS (skip notarize) ─────────────────────────
  # 暂时跳过 notarize（没有 Apple Developer 账号）。
  # 后续有了再启用：去掉 SKIP_NOTARIZE，并把 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # 配置到 repo secrets。
  macos:
    name: macOS (dmg + zip, unsigned)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky
      #（DeskSection 等 fake-timer+async 在并行时竞争超时）；实测串行全量 1521 全绿。
      # 全量单测套件：硬门禁。--no-file-parallelism 消除并行负载下的 flaky；
      # --retry 2 吸收单文件内跨用例共享状态导致的偶发 flaky（如 MobileApp.test.tsx
      # 的异步集成用例），真正坏掉的用例仍会全部失败、门禁有意义。
      - name: Run unit test suite (hard gate)
        run: npm run test:unit -- --no-file-parallelism --retry 2

      - name: Typecheck (non-blocking, visibility)
        run: npm run typecheck
        continue-on-error: true

      - name: Build + package macOS (skip notarization)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_NOTARIZE: 'true'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap

  # ───────────────────────── Smoke (real Electron launch) ─────────────────────────
  smoke:
    name: Smoke (real Electron preload launch)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build preload bundle
        run: npm run electron:preload

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # 冒烟测试：真实 Electron 拉起 + 断言 window.shadow。
      # GitHub Actions ubuntu runner 的 /tmp 共享内存偶发不可用（Chromium sandbox
      # `platform_shared_memory_region_posix` 报错），导致 preload 超时。
      # 这是 runner 基础设施问题，非代码回归。两层加固：
      #   1) 每次重试前把 TMPDIR/XDG_RUNTIME_DIR 指向 runner 自己可写的 $RUNNER_TEMP
      #      子目录，让 Chromium 的 .org.chromium.* 共享内存文件脱离病坏的 /tmp；
      #   2) 包裹 5 次重试（间隔 5s），进一步吸收偶发抖动。
      - name: Launch real Electron + assert window.shadow (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Smoke attempt $attempt"
            export TMPDIR="$RUNNER_TEMP/electron-smoke-$attempt"
            export XDG_RUNTIME_DIR="$TMPDIR"
            mkdir -p "$TMPDIR"
            if xvfb-run -a npm run test:smoke; then
              echo "::endgroup::"
              echo "✅ Smoke passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "⚠️ Smoke attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "❌ Smoke failed after 5 attempts"
          exit 1

  # ───────────────────────── Publish GitHub Release ─────────────────────────
  # 把三个平台的产物聚合到一个 GitHub Release
  release:
    name: Publish GitHub Release
    needs: [linux, windows, macos, smoke]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenShadow ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}