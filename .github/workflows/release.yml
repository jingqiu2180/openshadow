name: Release

# 触发：push 一个 v* tag（如 v0.2.0）即自动构建并发布
# 跳过 pre-release：在 tag 名加 -rc.1 / -beta.1 等后缀会被 electron-builder 识别为 pre-release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 允许创建/更新 GitHub Release

jobs:
  # ───────────────────────── Linux ─────────────────────────
  linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm fakeroot dpkg

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      - name: Build + package Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  # ───────────────────────── Windows ─────────────────────────
  windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      - name: Generate Windows icon
        run: node scripts/generate-windows-icon.cjs

      - name: Build + package Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Win 不签名（没证书）— 加 CSC_IDENTITY_AUTO_DISCOVERY=false 让 electron-builder 跳过签名
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-windows
          path: |
            release/*.exe
            release/latest.yml

  # ───────────────────────── macOS (skip notarize) ─────────────────────────
  # 暂时跳过 notarize（没有 Apple Developer 账号）。
  # 后续有了再启用：去掉 SKIP_NOTARIZE，并把 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # 配置到 repo secrets。
  macos:
    name: macOS (dmg + zip, unsigned)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run bridge contract + ghost-global guard tests
        run: npm run test:bridge && npm run test:contract

      - name: Build + package macOS (skip notarization)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_NOTARIZE: 'true'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openshadow-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  # ───────────────────────── Smoke (real Electron launch) ─────────────────────────
  smoke:
    name: Smoke (real Electron preload launch)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build preload bundle
        run: npm run electron:preload

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Launch real Electron + assert window.shadow
        run: xvfb-run -a npm run test:smoke

  # ───────────────────────── Publish GitHub Release ─────────────────────────
  # 把三个平台的产物聚合到一个 GitHub Release
  release:
    name: Publish GitHub Release
    needs: [linux, windows, macos, smoke]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenShadow ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}